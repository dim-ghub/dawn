# Optimized for: Artix Linux | Hyprland | OpenRC
# -------------------------------------------------------------------------------------------------

# --- SYSTEM ESSENTIALS ---

# Gnome Keyring: Stores passwords for apps (VSCode, Chrome, etc.).
# Uncomment to autostart if not using a systemd service:
# exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets

# XHost: Grants root access to the display (needed for GParted/Synaptic to run).
exec-once = xhost +si:localuser:root



# --- BACKGROUND SERVICES ---
exec-once = awww-daemon           # Wallpaper engine
exec-once = artix-pipewire-launcher
exec-once = $HOME/user_scripts/waybar/network/network_meter_daemon.sh

# hypridle - start via OpenRC service or autostart here:
# exec-once = hypridle              # Idle manager
exec-once = swayosd-server        # OSD for Volume/Brightness


# --- CLIPBOARD MANAGER ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular

# --- OPTIONAL / USER INTERFACE ---
exec-once = $HOME/user_scripts/waybar/waybar_autostart.sh
#exec-once = $HOME/user_scripts/waybar/toggle_timer_waybar.sh
# exec-once = nm-applet


# --- D-BUS ACTIVATION (for app startup) ---
exec-once = dbus-update-activation-environment --all
