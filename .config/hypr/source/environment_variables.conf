# Environment Variables
# Set your environment variables here.
# Hyprland-specific variables can go in this file.
# System-wide variables can also be set in ~/.config/hypr/edit_here/source/environment_variables.conf

# This environment variable is set here to fix a warning caused by hyprland on boot.
env = XDG_CURRENT_DESKTOP,Hyprland

# Cursor size specifically for Hyprland's internal rendering
env = HYPRCURSOR_SIZE,18

# While 'env' sets kitty, Hyprland prefers xdg-terminal-exec for standard integration.
env = TERMINAL,xdg-terminal-exec

# KERNEL TUNING:
# CPU Threads: Dynamically set based on available cores.
# Critical for optimizing compilation (make/ninja) and heavy parallel tasks.
env = OMP_NUM_THREADS,$(nproc)

# -----------------------------------------------------------------------------
# 2. GUI TOOLKIT CONFIGURATION (Universal)
# -----------------------------------------------------------------------------

# --- Qt Configuration ---
# "wayland;xcb" allows Qt apps to try Wayland first, falling back to XWayland if needed.
# Quotes are critical to prevent the shell from interpreting the semicolon.
env = QT_QPA_PLATFORM,wayland;xcb

# Theming: Uses qt6ct/qt5ct. Ensure these are installed.
env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_QPA_PLATFORMTHEME,qt5ct # Fallback for pure Qt5 environments

# Qt Visual Tweaks
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# --- GTK Configuration ---
# Prioritize Wayland, fall back to X11.
env = GDK_BACKEND,wayland,x11
env = QT_QUICK_CONTROLS_STYLE,Fusion

# --- Java Configuration ---
# Fixes blank screens/rendering issues in tiling WMs (Java AWT).
env = _JAVA_AWT_WM_NONREPARENTING,1


# -----------------------------------------------------------------------------
# 3. APPS & DEFAULT PREFERENCES
# -----------------------------------------------------------------------------
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,18 # Standardized to 24 (18 is very small for high DPI, adjust if needed)

env = TERMINAL,kitty
env = EDITOR,nvim
env = VISUAL,nvim

# -----------------------------------------------------------------------------
# 4. APP SPECIFIC FLAGS
# -----------------------------------------------------------------------------
env = SDL_VIDEODRIVER,wayland,x11
env = CLUTTER_BACKEND,wayland

# Clipboard Persistence
# Commented out: Ephemeral clipboard (resets on reboot).
# Uncommented: Persistent clipboard.
env = CLIPHIST_DB_PATH,${XDG_RUNTIME_DIR}/cliphist.db


# -----------------------------------------------------------------------------
# 6. VIRTUALIZATION
# -----------------------------------------------------------------------------
# Connects to system-wide libvirt instance by default.
env = LIBVIRT_DEFAULT_URI,qemu:///system
